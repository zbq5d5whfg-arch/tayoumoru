<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>多様性モルック専用計算サイト</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f0f2f5; }
        .calculator-box {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 12px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* 入力欄のコンテナ設定 */
        .input-container {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            background: #fafafa;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .input-row { margin-bottom: 8px; display: flex; align-items: center; }
        .input-row label { width: 50px; font-size: 0.9em; color: #666; }
        input[type="number"] {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 120px;
        }

        /* 結果表示エリア */
        .result-text { font-weight: bold; color: #d9534f; font-size: 1.2em; }
        .total-area {
            font-size: 1.5em;
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ボタンのデザイン */
        .reset-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .reset-btn:hover { background-color: #5a6268; }
    </style>
</head>
<body>

    <div class="calculator-box">
        <h2>1. 得点変換</h2>
        <p>得点を入力：
            <input type="number" id="baseNum" oninput="calcMultiples()" placeholder="0">
        </p>
        <p>テニス（２倍）： <span id="doubleResult" class="result-text">0</span></p>
        <p>バレーボール（０．５倍）： <span id="halfResult" class="result-text">0</span></p>
    </div>

    <div class="calculator-box">
        <h2>2. 合計得点</h2>
        <div id="inputs" class="input-container">
            </div>
        
        <div class="total-area">
            <span>合計: <span id="totalResult" style="color: blue;">0</span></span>
            <button class="reset-btn" onclick="resetCalc2()">合計得点をリセット</button>
        </div>
    </div>

    <script>
        // --- ページ読み込み時の初期化 ---
        const inputCount = 50;
        const container = document.getElementById('inputs');

        // 50個の入力欄を自動生成
        for (let i = 1; i <= inputCount; i++) {
            const div = document.createElement('div');
            div.className = 'input-row';
            div.innerHTML = `
                <label>No.${i}</label>
                <input type="number" class="num-input" oninput="calcSum()" placeholder="0">
            `;
            container.appendChild(div);
        }

        // --- 計算用関数 ---

        // 計算機1の処理
        function calcMultiples() {
            const val = parseFloat(document.getElementById('baseNum').value);
            if (!isNaN(val)) {
                document.getElementById('doubleResult').innerText = (val * 2).toLocaleString();
                document.getElementById('halfResult').innerText = (val * 0.5).toLocaleString();
            } else {
                document.getElementById('doubleResult').innerText = "0";
                document.getElementById('halfResult').innerText = "0";
            }
        }

        // 計算機2の処理
        function calcSum() {
            let total = 0;
            const allInputs = document.querySelectorAll('.num-input');
            
            allInputs.forEach(input => {
                const val = parseFloat(input.value) || 0;
                total += val;
            });

            document.getElementById('totalResult').innerText = total.toLocaleString();
        }

        // 計算機2のリセット処理
        function resetCalc2() {
            // 確認ダイアログを出したい場合は if(confirm("リセットしますか？")) を使います
            const allInputs = document.querySelectorAll('.num-input');
            allInputs.forEach(input => {
                input.value = ""; // 入力欄を空にする
            });
            calcSum(); // 合計を再計算（0にする）
        }
    </script>

</body>
</html>
